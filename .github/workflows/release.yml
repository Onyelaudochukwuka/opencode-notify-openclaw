name: Release

on:
  push:
    branches:
      - main

jobs:
  release-please:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org/"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        # if monorepo: set working-directory: packages/opencode-notify-openclaw
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run Tests
        run: bun test

      - name: Publish
        # if monorepo: add working-directory here too
        run: npm publish --access public
